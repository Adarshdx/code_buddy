name: code_buddy
description: AI-powered coding companion for students and beginner developers.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_crashlytics: ^5.0.5
  google_sign_in: ^7.2.0
  go_router: ^14.6.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  highlight: ^0.7.0
  code_text_field: ^1.1.0
  google_fonts: ^6.3.2
  flutter_animate: ^4.5.2
  flutter_markdown: ^0.7.7+1
  http: ^1.6.0
  uuid: ^4.5.1
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/problems/
